<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types</title>
    
</head>

<body>
    <h2>Types of CSS</h2>

    <h4>Inline CSS</h4>
    <p>=>Internal CSS is written inside the style tag within the head section of an HTML document.</p>

    <h4>Example</h4>
    <p style="color: blue; font-size: 18px;">This is a blue paragraph.</p>

    <p><b>Advantages:</b>Quick styling, useful for testing.</p>
    <p><b>Disadvantages:</b>Not reusable, hard to maintain, increases page size.</p>
    

    
</body>

</html>
