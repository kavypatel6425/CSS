<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal</title>

    <style>
        p {
                color: green;
                font-size: 20px;
        }
        
    </style>
</head>
<body>
    <h4>Internal CSS</h4>
    <p>Internal CSS is written inside the style tag within the head section of an HTML document.</p>

    <p><b>Advantages:</b>Useful for styling a single document.</p>
    <p><b>Disadvantages:</b>Styles can't be reused across multiple pages.</p>
</body>
</html>
