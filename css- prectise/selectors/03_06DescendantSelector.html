<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descendant Selector</title>
    <style>
        div p {
        color: green;
        }
    </style>
</head>

<body>
    <h4>6. Descendant Selector</h4>
    <p>Targets elements that are nested inside a specific parent.</p>

    <h4>example</h4>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
    <p>div p {
        color: green;
        }
    </p>

    <p>Targets all <p> inside <div>.</p>
</body>

</html>
