<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <style>
        ul>li {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <h4>7. Child Selector</h4>
    <p>Selects direct children only.</p>

    <h4>example</h4>
    <ul>
        <li>BMW</li>
        <li>Mahindra</li>
    </ul>

    <p>ul > li {
        background-color: aqua;
        }</p>
</body>

</html>
