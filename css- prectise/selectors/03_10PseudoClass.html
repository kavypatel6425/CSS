<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Pseudo-Class</title>
    <style>
        p:hover {
            color: orange;
        }
    </style>
</head>

<body>
    <h4>10. Pseudo-Class</h4>
    <p>Define a special state of an element (hover, active, etc).</p>

    <h4>example</h4>

    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Fugiat, sapiente.</p>

    <p>p:hover {
        color: orange;
        }</p>

    <p>Other examples: :focus, :visited, :first-child, :last-child.</p>
</body>

</html>
