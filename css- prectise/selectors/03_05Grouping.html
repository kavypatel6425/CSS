<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector</title>
    <style>
        h1,h2,h3 {
            color: blue;
        }
    </style>
</head>

<body>
    <h4>5. Grouping Selector</h4>
    <p>Applies the same style to multiple selectors.</p>

    <h4>example</h4>

    <h1>Lorem</h1>
    <h2>Lorem</h2>
    <h3>Lorem</h3>
    <p>h1, h2, h3 {
        color: blue;
    }</p>
</body>

</html>
