<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
        border: 1px solid black;
        }
    </style>
</head>

<body>
    <h4>2. Class Selector</h4>
    <p class="box">Targets elements with a specific class attribute.</p>
    <p>.box {
        border: 1px solid black;
        }</p>

    <p>Use a dot (.) before the class name.</p>
</body>

</html>
